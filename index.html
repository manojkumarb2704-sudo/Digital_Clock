<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Digital Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

background:linear-gradient(-45deg,
#0f2027,
#203a43,
#2c5364,
#1f1c2c,
#928dab);

background-size:500% 500%;

animation:bg 12s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

position:relative;
width:90%;
max-width:750px;

padding:40px;

border-radius:30px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.2);

box-shadow:

0 0 40px rgba(0,255,255,.2),
0 0 80px rgba(0,0,0,.3);

text-align:center;

animation:float 5s ease-in-out infinite;

}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

}

.title{

font-size:28px;
color:white;
margin-bottom:30px;
letter-spacing:4px;

text-shadow:0 0 15px cyan;

}

.clock{

font-size:90px;
font-weight:bold;
color:#00ffff;

text-shadow:

0 0 10px cyan,
0 0 25px cyan,
0 0 50px cyan,
0 0 80px cyan;

margin-bottom:20px;

}

.date{

font-size:25px;
color:white;
letter-spacing:2px;

margin-bottom:12px;

}

.zone{

font-size:18px;

color:#00ff99;

letter-spacing:3px;

}

.circle{

position:absolute;
border-radius:50%;
filter:blur(90px);
z-index:-1;

}

.c1{

width:250px;
height:250px;
background:#00ffff;
top:-60px;
left:-70px;

}

.c2{

width:250px;
height:250px;
background:#ff00ff;
bottom:-60px;
right:-60px;

}

.footer{

margin-top:30px;

font-size:14px;

color:#ddd;

letter-spacing:2px;

}

@media(max-width:768px){

.clock{

font-size:60px;

}

.date{

font-size:18px;

}

.title{

font-size:22px;

}

}

@media(max-width:480px){

.container{

padding:25px;

}

.clock{

font-size:42px;

}

.date{

font-size:16px;

}

.zone{

font-size:14px;

}

}

</style>

</head>
<body>

<div class="container">

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="title">
DIGITAL CLOCK
</div>

<div id="clock" class="clock">
00:00:00
</div>

<div id="date" class="date">
Loading...
</div>

<div id="zone" class="zone"></div>

<div class="footer">
Designed with ❤️ using HTML CSS & JavaScript
</div>

</div>

<script>

function updateClock(){

const now=new Date();

let hr=now.getHours();
let min=now.getMinutes();
let sec=now.getSeconds();

const ampm=hr>=12?"PM":"AM";

hr=hr%12;
hr=hr?hr:12;

hr=String(hr).padStart(2,"0");
min=String(min).padStart(2,"0");
sec=String(sec).padStart(2,"0");

document.getElementById("clock").innerHTML=
`${hr}:${min}:${sec} <span style="font-size:35px">${ampm}</span>`;

const options={
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
};

document.getElementById("date").innerHTML=
now.toLocaleDateString(undefined,options);

document.getElementById("zone").innerHTML=
Intl.DateTimeFormat().resolvedOptions().timeZone;

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
