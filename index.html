<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Responsive Clock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #050505;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Dynamic Animated Background */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 231, 255, 0.3) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            mix-blend-mode: screen;
            pointer-events: none;
            transition: background 1s ease;
        }

        /* Glassmorphism Clock Container */
        .clock-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 4rem;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .clock-container:hover {
            box-shadow: 0 40px 80px rgba(0, 231, 255, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        /* Date Section */
        .date-box {
            font-size: 1rem;
            font-weight: 500;
            color: #8a99ad;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            transform: translateZ(30px);
            transition: color 1s ease;
        }

        /* Time Display */
        .time-box {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 5.5rem;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: translateZ(50px);
        }

        /* Specific Glowing Colors for Elements */
        .hours { color: #ffffff; }
        .minutes { color: #00e7ff; text-shadow: 0 0 30px rgba(0, 231, 255, 0.5); }
        .seconds { 
            font-size: 3rem; 
            font-weight: 400; 
            color: #ff007f; 
            text-shadow: 0 0 30px rgba(255, 0, 127, 0.5);
            min-width: 80px;
            text-align: left;
        }

        .colon {
            color: #4a5568;
            animation: blink 1s infinite;
        }

        /* Period (AM/PM) Box */
        .period-box {
            font-size: 1.2rem;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(45deg, #00e7ff, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-top: 1rem;
            transform: translateZ(40px);
        }

        /* Blinking Animation for Colons */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .clock-container {
                padding: 2rem 2.5rem;
                width: 90%;
                max-width: 450px;
            }
            .time-box {
                font-size: 3.5rem;
            }
            .seconds {
                font-size: 2rem;
                min-width: 50px;
            }
            .date-box {
                font-size: 0.8rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow" id="bgGlow"></div>

    <div class="clock-container" id="clockContainer">
        <div class="date-box" id="dateBox">LOADING DATE...</div>
        <div class="time-box">
            <span class="hours" id="hours">00</span>
            <span class="colon">:</span>
            <span class="minutes" id="minutes">00</span>
            <span class="seconds" id="seconds">00</span>
        </div>
        <div class="period-box" id="period">PM</div>
    </div>

    <script>
        // 1. Core Clock Logic
        function updateClock() {
            const now = new Date();
            
            // Time elements
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            // Convert to 12-hour format
            hours = hours % 12;
            hours = hours ? hours : 12; // The hour '0' should be '12'
            const hoursStr = String(hours).padStart(2, '0');

            // DOM Updates
            document.getElementById('hours').textContent = hoursStr;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
            document.getElementById('period').textContent = ampm;

            // Date Elements
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateBox').textContent = now.toLocaleDateString('en-US', options);

            // Dynamic background glow shifting color based on seconds
            const hue = (now.getSeconds() * 6) + (now.getMinutes() * 0.1); 
            document.getElementById('bgGlow').style.background = `radial-gradient(circle, hsla(${hue}, 100%, 50%, 0.25) 0%, rgba(0,0,0,0) 70%)`;
        }

        // Initialize clock and set interval
        setInterval(updateClock, 1000);
        updateClock();


        // 2. 3D Parallax Hover Effect 
        const card = document.getElementById('clockContainer');
        const body = document.body;

        body.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 15; // sensitivity
            const yAxis = (window.innerHeight / 2 - e.pageY) / 15;
            
            card.style.transform = `rotateY(${-xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset positions on mouse leave
        body.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            card.style.transition = "transform 0.5s ease";
        });

        body.addEventListener('mouseenter', () => {
            card.style.transition = "none";
        });
    </script>
</body>
</html>
