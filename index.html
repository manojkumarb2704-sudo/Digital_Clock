<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Digital Clock</title>
    
    <link href="https://fonts.googleapis.com/css2=family=Inter:wght@300;500&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #060713;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --text-primary: #ffffff;
            --text-secondary: #8f9cae;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Ambient matrix background grid */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* Clock Outer Wrapper for micro-interaction */
        .clock-container {
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .clock-container:hover {
            transform: translateY(-5px) scale(1.02);
        }

        /* Dynamic Reactive Glow backdrop */
        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
            pointer-events: none;
            transition: background 1s ease;
        }

        /* Glassmorphism Core Card */
        .clock-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 3rem 4rem;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* Top Calendar Layout */
        .date-section {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
            width: 100%;
            text-align: center;
        }

        /* Central Time Engine Typography */
        .time-section {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Blinking Colon Dividers */
        .colon {
            color: var(--neon-cyan);
            animation: blink 1s infinite;
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Pink Focal point for Seconds */
        #seconds {
            font-size: 3rem;
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink);
            align-self: flex-end;
            margin-bottom: 0.5rem;
            min-width: 75px; /* Keeps layout locked when digits change width */
        }

        #ampm {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-left: 0.5rem;
            align-self: flex-end;
            margin-bottom: 0.9rem;
        }

        /* Smart Greeting Layer */
        .greeting-section {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--neon-cyan);
            opacity: 0.8;
        }

        /* Animations */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* Comprehensive Responsive Breakpoint */
        @media (max-width: 600px) {
            .clock-card {
                padding: 2rem 2rem;
                width: 90vw;
            }
            .time-section {
                font-size: 2.8rem;
            }
            #seconds {
                font-size: 1.8rem;
                min-width: 45px;
            }
            #ampm {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="glow-effect"></div>
        
        <div class="clock-card">
            <div class="date-section" id="date-display">
                Initializing...
            </div>
            
            <div class="time-section">
                <span id="hours">00</span>
                <span class="colon">:</span>
                <span id="minutes">00</span>
                <span class="colon">:</span>
                <span id="seconds">00</span>
                <span id="ampm">AM</span>
            </div>
            
            <div class="greeting-section" id="greeting">
                Welcome
            </div>
        </div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---
        function updateClock() {
            const now = new Date();
            
            // 1. Core Structural Time Gathering
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            const greetingEl = document.getElementById('greeting');
            const glowEl = document.querySelector('.glow-effect');
            
            // 2. Real-time Reactive Ambient Lighting Environment
            if (hours < 12) {
                greetingEl.textContent = "Good Morning";
                glowEl.style.background = "radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, transparent 70%)"; // Electric Cyan
            } else if (hours < 18) {
                greetingEl.textContent = "Good Afternoon";
                glowEl.style.background = "radial-gradient(circle, rgba(255, 170, 0, 0.12) 0%, transparent 70%)"; // Amber Sunset
            } else {
                greetingEl.textContent = "Good Evening";
                glowEl.style.background = "radial-gradient(circle, rgba(255, 0, 85, 0.12) 0%, transparent 70%)"; // Cyberpink Dusk
            }

            // Transform into clean standard 12-Hour format
            hours = hours % 12;
            hours = hours ? hours : 12; 
            
            // String formatting padding to avoid element shaking
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            // Injecting elements directly into DOM layout 
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
            document.getElementById('ampm').textContent = ampm;

            // 3. Clean Language-Sensitive Date Generation
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            document.getElementById('date-display').textContent = dateString;
        }

        // Initialize clock engine immediately upon render
        updateClock();

        // Exact intervals mapping every 1000ms loop
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
